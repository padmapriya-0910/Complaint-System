<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Cloud Complaint System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .register-card {
            background: white;
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            margin: 1rem;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .btn-register:hover { transform: translateY(-2px); }
        .otp-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 1rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="text-center mb-4">
            <i class="fas fa-cloud-upload-alt fa-3x mb-3" style="color: #667eea;"></i>
            <h2 style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">
                Create Account
            </h2>
            <p class="text-muted">Join the cloud complaint system</p>
        </div>
        
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-at"></i></span>
                    <input name="username" class="form-control" placeholder="Choose a username" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input name="email" class="form-control" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Role</label>
                <select name="role" class="form-control">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            
            {% if not show_otp %}
                <button name="generate_otp" class="btn btn-register text-white w-100">
                    <i class="fas fa-key me-2"></i>Generate OTP
                </button>
            {% endif %}
            
            {% if show_otp %}
                <div class="otp-box text-center">
                    <i class="fas fa-envelope-open-text fa-2x mb-2" style="color: #28a745;"></i>
                    <p class="mb-2">Your OTP code is:</p>
                    <h3 class="text-success fw-bold">{{ otp }}</h3>
                    <small class="text-muted">Enter this code to verify your account</small>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Enter OTP</label>
                    <input name="otp" class="form-control" placeholder="Enter 4-digit OTP" required>
                </div>
                
                <button name="verify_otp" class="btn btn-register text-white w-100">
                    <i class="fas fa-check-circle me-2"></i>Verify & Register
                </button>
            {% endif %}
            
            {% if error %}
                <div class="alert alert-danger mt-3">
                    <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                </div>
            {% endif %}
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted">Already have an account? <a href="/login" class="text-decoration-none">Login here</a></p>
        </div>
    </div>
</body>
</html>
