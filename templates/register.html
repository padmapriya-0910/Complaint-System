<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
  <h2>Register</h2>

  <form method="post" class="card p-4">

    <input name="name" class="form-control mb-2" placeholder="Name">
    <input name="username" class="form-control mb-2" placeholder="Username">
    <input name="email" class="form-control mb-2" placeholder="Email">
    <input type="password" name="password" class="form-control mb-2" placeholder="Password">

    <select name="role" class="form-control mb-2">
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>

    {% if not show_otp %}
      <button name="generate_otp" class="btn btn-primary">Generate OTP</button>
    {% endif %}

    {% if show_otp %}
      <p class="text-success">Your OTP: {{otp}}</p>

      <input name="otp" class="form-control mb-2" placeholder="Enter OTP">

      <button name="verify_otp" class="btn btn-success">Verify & Register</button>
    {% endif %}

    {% if error %}
      <p class="text-danger">{{error}}</p>
    {% endif %}

  </form>
</div>

</body>
</html>
