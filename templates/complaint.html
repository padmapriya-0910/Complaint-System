<!DOCTYPE html>
<html>
<head>
<title>Register Complaint</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
  <h2 class="text-center">Register Complaint</h2>

  <form method="post" class="card p-4 shadow">

    <!-- Category -->
    <label>Complaint Category</label>
    <select name="category" class="form-control mb-3" required>
      <option value="">-- Select Category --</option>
      <option>Water Problem</option>
      <option>Electricity Issue</option>
      <option>Road Damage</option>
      <option>Garbage Issue</option>
      <option>Other</option>
    </select>

    <!-- Description -->
    <label>Description</label>
    <textarea name="description" class="form-control mb-3"
              placeholder="Describe your issue..." required></textarea>

    <!-- Location -->
    <label>Location</label>
    <input name="location" class="form-control mb-3"
           placeholder="Enter area/location" required>

    <!-- Priority -->
    <label>Priority</label>
    <select name="priority" class="form-control mb-3">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <button class="btn btn-primary w-100">Submit Complaint</button>

  </form>

  <a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
