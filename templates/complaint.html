<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Complaint | Cloud Complaint System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .form-card {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-title h2 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .btn-submit:hover { transform: translateY(-2px); }
        .form-label {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container form-container">
        <div class="form-card">
            <div class="form-title">
                <i class="fas fa-cloud-upload-alt fa-3x mb-3" style="color: #667eea;"></i>
                <h2>Register New Complaint</h2>
                <p class="text-muted">Submit your issue and we'll resolve it quickly</p>
            </div>
            
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-tag me-2"></i>Complaint Category
                    </label>
                    <select name="category" class="form-control" required>
                        <option value="">-- Select Category --</option>
                        <option>Water Problem</option>
                        <option>Electricity Issue</option>
                        <option>Road Damage</option>
                        <option>Garbage Issue</option>
                        <option>Other</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-align-left me-2"></i>Description
                    </label>
                    <textarea name="description" class="form-control" rows="4" 
                              placeholder="Describe your issue in detail..." required></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-map-marker-alt me-2"></i>Location
                    </label>
                    <input name="location" class="form-control" 
                           placeholder="Enter area/location" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">
                        <i class="fas fa-flag me-2"></i>Priority Level
                    </label>
                    <select name="priority" class="form-control">
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-submit text-white w-100">
                    <i class="fas fa-paper-plane me-2"></i>Submit Complaint
                </button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/dashboard" class="text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</body>
</html>
