<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Complaint System | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero-card {
            background: white;
            border-radius: 50px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .btn-custom {
            border-radius: 50px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            margin: 0.5rem;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            transform: translateY(-3px);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
        }
        .btn-register {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }
        .btn-register:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="hero-card">
            <i class="fas fa-cloud-upload-alt fa-4x mb-3" style="color: #667eea;"></i>
            <h1 class="mb-3" style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">
                Cloud Complaint System
            </h1>
            <p class="text-muted mb-4">Submit, track, and resolve complaints efficiently with our cloud-based platform.</p>
            
            <div class="d-grid gap-2">
                <a href="/login" class="btn btn-custom btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </a>
                <a href="/register" class="btn btn-custom btn-register">
                    <i class="fas fa-user-plus me-2"></i>Register
                </a>
            </div>
            
            <div class="mt-4">
                <small class="text-muted">
                    <i class="fas fa-shield-alt me-1"></i> Secure & Reliable
                </small>
            </div>
        </div>
    </div>
</body>
</html>
