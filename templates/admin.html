<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
  <h2>Admin Panel</h2>

  <a href="/logout" class="btn btn-danger mb-3">Logout</a>

  {% for c in complaints %}
    <div class="card p-3 mb-2 shadow">

      <b>User:</b> {{c[1]}} <br>
      <b>Category:</b> {{c[2]}} <br>
      <b>Description:</b> {{c[3]}} <br>
      <b>Location:</b> {{c[4]}} <br>
      <b>Priority:</b> {{c[5]}} <br>
      <b>Date:</b> {{c[6]}} <br>
      <b>Status:</b> {{c[7]}} <br><br>

      <a href="/update_status/{{c[0]}}/Resolved" class="btn btn-success btn-sm">Resolved</a>
      <a href="/update_status/{{c[0]}}/Pending" class="btn btn-warning btn-sm">Pending</a>

    </div>
  {% endfor %}

</div>

</body>
</html>
